<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SC Contract Optimizer</title>
    <style>
        :root {
            --accent: #f97316;
            --accent-hover: #ff8c42;
            --accent-text: #0f0f0f;
            --ok: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            padding: 12px; 
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 { font-size: 24px; margin-bottom: 16px; color: #ffffff; font-weight: 700; }
        h2 { font-size: 11px; color: #ffffff; margin-top: 12px; margin-bottom: 8px; text-transform: uppercase; font-weight: 700; letter-spacing: 1.5px; }
        .wip { color: var(--accent); font-size: 10px; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        @media (max-width: 1200px) { .main-grid { grid-template-columns: 1fr; } }
        .panel { background: #1a1a1a; border: 1px solid #2a2a2a; padding: 16px; }
        .control-group { margin-bottom: 8px; display: flex; gap: 8px; align-items: center; }
        label { font-size: 10px; color: #999; text-transform: uppercase; min-width: 60px; font-weight: 700; letter-spacing: 1px; }
        select, input { flex: 1; padding: 7px 8px; background: #262626; color: #e0e0e0; border: 1px solid #333; font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        select:focus, input:focus { outline: none; border-color: var(--accent); background: #2a2a2a; }
        .toggle-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
        .toggle-btn { padding: 8px; background: #262626; color: #999; border: 1px solid #333; font-family: inherit; font-size: 9px; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s; }
        .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
        .toggle-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); }
        button { padding: 8px 12px; background: var(--accent); color: var(--accent-text); border: 1px solid var(--accent); font-family: inherit; font-size: 10px; font-weight: 700; cursor: pointer; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; margin-right: 6px; margin-bottom: 6px; }
        button:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        button.secondary { background: #262626; color: #e0e0e0; border-color: #333; }
        button.secondary:hover { border-color: var(--accent); color: var(--accent); }
        
        .contract-row { 
            background: #262626; 
            border: 1px solid #333; 
            padding: 10px; 
            margin-bottom: 6px;
        }

        #dropoffs.two-col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        #pickups.two-col {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        .status-box { background: #1f3a1f; border: 1px solid #2a5a2a; padding: 8px; margin: 8px 0; font-size: 10px; border-left: 3px solid var(--ok); }
        .status-box.warn { background: #3a3a1f; border-left-color: var(--accent); }
        .status-box.error { background: #3a1f1f; border-left-color: #ff6b6b; }

        #settingsPanel { 
            background: #1a1a1a; 
            border: 1px solid #2a2a2a; 
            padding: 12px; 
            margin-bottom: 12px; 
        }

        .theme-ball {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            box-shadow: 0 0 0 rgba(255,255,255,0);
        }

        .theme-ball:hover {
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
        }

        .theme-ball.active {
            border-color: #ffffff;
            box-shadow: 0 0 16px rgba(255, 255, 255, 0.8);
        }
        
        #route { 
            grid-column: 1 / -1;
            background: #262626; 
            padding: 12px; 
            border: 1px solid #333; 
            min-height: 350px; 
            font-size: 10px; 
            line-height: 1.6; 
            font-family: 'Courier New', monospace;
            overflow-y: auto;
            max-height: 700px;
            color: #e0e0e0;
        }

        .route-line {
            padding: 4px 6px;
            margin: 1px 0;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .route-line.clickable {
            background: #333;
            border-left: 2px solid #666;
        }

        .route-line.clickable:hover {
            background: #3a3a3a;
            border-left-color: var(--accent);
        }

        .route-line.completed {
            background: #1f3a1f;
            border-left-color: var(--ok);
            color: var(--ok);
            text-decoration: line-through;
        }

        .route-line.completed::before {
            content: "✓ ";
            color: var(--ok);
            font-weight: 700;
        }

        .route-header {
            color: var(--accent);
            font-weight: 700;
            margin-top: 6px;
            margin-bottom: 4px;
        }

        .route-phase {
            opacity: 0.6;
            margin-top: 8px;
        }

        .route-phase.active {
            opacity: 1;
        }

        .route-summary {
            border-top: 1px solid #333;
            margin-top: 12px;
            padding-top: 8px;
            color: #999;
            font-size: 9px;
        }

        .progress-info {
            font-size: 9px;
            color: #999;
            margin: 6px 0;
        }
    </style>
</head>
<body>
    <h1>SC Contract Optimizer <span class="wip">ADVANCED</span></h1>
    
    <div style="margin-bottom: 12px;">
        <button class="secondary" onclick="toggleSettings()" style="margin: 0; padding: 6px 10px; font-size: 9px;">⚙ Settings</button>
    </div>

    <div id="settingsPanel" style="display: none;">
        <h2>Display Theme</h2>
        <div style="display: flex; gap: 12px;">
            <div class="theme-ball" data-theme="orange" style="background: #f97316;" onclick="setThemeColor('orange')" title="Orange"></div>
            <div class="theme-ball" data-theme="purple" style="background: #a855f7;" onclick="setThemeColor('purple')" title="Purple"></div>
            <div class="theme-ball" data-theme="green" style="background: #22c55e;" onclick="setThemeColor('green')" title="Green"></div>
            <div class="theme-ball" data-theme="blue" style="background: #3b82f6;" onclick="setThemeColor('blue')" title="Blue"></div>
        </div>
    </div>
    
    <div class="main-grid">
        <div class="panel">
            <h2>Configuration</h2>

            <div class="control-group">
                <label>System:</label>
                <select id="systemSelect" onchange="updateLocationOptions(); updateUI()">
                    <option value="All">All Systems</option>
                    <option value="Pyro">Pyro</option>
                    <option value="Stanton">Stanton</option>
                    <option value="Nyx" disabled>Nyx [WiP]</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>Ship:</label>
                <select id="shipSelect" onchange="updateStatus()">
                    <option value="">-- Select Ship --</option>
                    <optgroup label="SMALL">
                        <option value="400i" data-capacity="42">400i (42 SCU)</option>
                        <option value="600i" data-capacity="44">600i (44 SCU)</option>
                        <option value="Connie-Andromeda" data-capacity="96">Constellation Andromeda (96 SCU)</option>
                        <option value="Connie-Aquila" data-capacity="96">Constellation Aquila (96 SCU)</option>
                        <option value="Connie-Phoenix" data-capacity="80">Constellation Phoenix (80 SCU)</option>
                        <option value="Corsair" data-capacity="72">Corsair (72 SCU)</option>
                        <option value="Cutlass" data-capacity="46">Cutlass Black (46 SCU)</option>
                        <option value="Freelancer" data-capacity="66">Freelancer (66 SCU)</option>
                        <option value="Hull-A" data-capacity="64">Hull A (64 SCU)</option>
                        <option value="Mercury" data-capacity="114">Mercury Star Runner (114 SCU)</option>
                        <option value="MOLE" data-capacity="96">MOLE (96 SCU)</option>
                        <option value="Prospector" data-capacity="48">Prospector (48 SCU)</option>
                        <option value="Starlancer-TAC" data-capacity="96">Starlancer TAC (96 SCU)</option>
                        <option value="Talus" data-capacity="96">Talus (96 SCU)</option>
                    </optgroup>
                    <optgroup label="MEDIUM">
                        <option value="890-Jump" data-capacity="388">890 Jump (388 SCU)</option>
                        <option value="A2-Hercules" data-capacity="216">A2 Hercules Starlifter (216 SCU)</option>
                        <option value="Asgard" data-capacity="180">Asgard (180 SCU)</option>
                        <option value="Carrack" data-capacity="456">Carrack (456 SCU)</option>
                        <option value="Carrack-Expedition" data-capacity="456">Carrack Expedition (456 SCU)</option>
                        <option value="Connie-Taurus" data-capacity="174">Constellation Taurus (174 SCU)</option>
                        <option value="Freelancer-MAX" data-capacity="120">Freelancer MAX (120 SCU)</option>
                        <option value="Hermes" data-capacity="288">Hermes (288 SCU)</option>
                        <option value="MOTH" data-capacity="224">MOTH (224 SCU)</option>
                        <option value="Orion" data-capacity="384">Orion (384 SCU)</option>
                        <option value="RAFT" data-capacity="192">RAFT (192 SCU)</option>
                        <option value="Reclaimer" data-capacity="420">Reclaimer (420 SCU)</option>
                        <option value="Starfarer" data-capacity="291">Starfarer (291 SCU)</option>
                        <option value="Starfarer-Gemini" data-capacity="291">Starfarer Gemini (291 SCU)</option>
                        <option value="Starlancer-BLD" data-capacity="128">Starlancer BLD (128 SCU)</option>
                        <option value="Starlancer-MAX" data-capacity="224">Starlancer MAX (224 SCU)</option>
                        <option value="Zeus-CL" data-capacity="128">Zeus Mk II CL (128 SCU)</option>
                    </optgroup>
                    <optgroup label="LARGE">
                        <option value="C2-Hercules" data-capacity="696">C2 Hercules Starlifter (696 SCU)</option>
                        <option value="Caterpillar" data-capacity="576">Caterpillar (576 SCU)</option>
                        <option value="Hull-B" data-capacity="512">Hull B (512 SCU)</option>
                        <option value="Hull-C" data-capacity="4608">Hull C (4,608 SCU)</option>
                        <option value="Idris-M" data-capacity="1326">Idris-M (1,326 SCU)</option>
                        <option value="Idris-P" data-capacity="1374">Idris-P (1,374 SCU)</option>
                        <option value="Ironclad" data-capacity="2200">Ironclad (2,200 SCU)</option>
                        <option value="Ironclad-Assault" data-capacity="1440">Ironclad Assault (1,440 SCU)</option>
                        <option value="M2-Hercules" data-capacity="522">M2 Hercules Starlifter (522 SCU)</option>
                        <option value="Polaris" data-capacity="576">Polaris (576 SCU)</option>
                        <option value="Railen" data-capacity="640">Railen (640 SCU)</option>
                    </optgroup>
                </select>
            </div>

            <div id="statusBox"></div>

            <div class="control-group">
                <label>Start:</label>
                <select id="startLocation"></select>
            </div>

            <h2>Contract Type</h2>
            <div class="toggle-group">
                <button class="toggle-btn active" onclick="setContractType('single-multi')">Single→Multi</button>
                <button class="toggle-btn" onclick="setContractType('multi-single')">Multi→Single</button>
                <button class="toggle-btn" onclick="setContractType('multi-multi')">Multi→Multi</button>
            </div>

            <h2 id="pickupLabel">Pickups</h2>
            <div id="pickups"></div>

            <h2 id="dropoffLabel" style="display:none;">Dropoffs</h2>
            <div id="dropoffs"></div>

            <div style="margin-top: 16px;">
                <button onclick="calculateRoute()">Calculate Route</button>
                <button class="secondary" onclick="resetTracking()">Reset Progress</button>
                <button class="secondary" onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <div class="panel">
            <h2>Route Output — Click to Mark Complete</h2>
            <div id="progressInfo" class="progress-info"></div>
            <div id="route">Set contract type and add locations to calculate route.</div>
        </div>
    </div>

    <script>
        const locations = [
            {name: "Checkmate", sys: "Pyro", lat: 0.01, lon: -5.19, dist: 10.59},
            {name: "Dudley & Daughters", sys: "Pyro", lat: 0.00, lon: -155.25, dist: 68.33},
            {name: "Endgame (Terminus L3)", sys: "Pyro", lat: 0.00, lon: -40.23, dist: 68.29},
            {name: "Gaslight", sys: "Pyro", lat: 0.02, lon: -95.22, dist: 47.21},
            {name: "Megumi Refueling (Terminus L5)", sys: "Pyro", lat: 0.01, lon: 64.77, dist: 68.29},
            {name: "Orbituary", sys: "Pyro", lat: 0.00, lon: 154.76, dist: 17.8},
            {name: "Patch City", sys: "Pyro", lat: 0.00, lon: -35.26, dist: 17.79},
            {name: "Rat's Nest (Pyro V L5)", sys: "Pyro", lat: 0.02, lon: -170.24, dist: 42.92},
            {name: "Rod's Fuel 'N Supplies (Pyro V L4)", sys: "Pyro", lat: -0.01, lon: -15.20, dist: 42.92},
            {name: "Ruin Station", sys: "Pyro", lat: 0.00, lon: 134.77, dist: 68.32},
            {name: "Starlight Service Station", sys: "Pyro", lat: 0.00, lon: 155.79, dist: 160.1},
            {name: "Stanton Gateway", sys: "Pyro", lat: 0.00, lon: 49.90, dist: 53.06},
            
            // === STANTON ===
            {name: "Area18 (ArcCorp)", sys: "Stanton", lat: 0.00, lon: -105, dist: 31},
            {name: "ArcCorp", sys: "Stanton", lat: 0.00, lon: -100, dist: 32},
            {name: "Baijini Point", sys: "Stanton", lat: 0.00, lon: -110, dist: 30},
            {name: "Crusader", sys: "Stanton", lat: 0.00, lon: -75, dist: 35},
            {name: "Everus Harbor", sys: "Stanton", lat: 0.00, lon: 000, dist: 12.85},
			{name: "Grim HEX", sys: "Stanton", lat: 0.00, lon: -60, dist: 38},
            {name: "Hurston", sys: "Stanton", lat: 0.00, lon: 000, dist: 12.85},
            {name: "Lorville (Hurston)", sys: "Stanton", lat: 0.00, lon: 165, dist: 24},
            {name: "Microtech", sys: "Stanton", lat: 0.00, lon: 58.86, dist: 43.44},
            {name: "Microtech Calliope", sys: "Stanton", lat: 0.00, lon: 58.92, dist: 43.39},
            {name: "MIC-L1 Shallow Frontier Station", sys: "Stanton", lat: 0.00, lon: 58.86, dist: 39.09},
            {name: "MIC-L2 Long Forest Station", sys: "Stanton", lat: 0.01, lon: 58.86, dist: 47.79},
            {name: "MIC-L3 Endless Odyssey Station", sys: "Stanton", lat: 0.01, lon: -121.12, dist: 43.43},
            {name: "MIC-L4 Red Crossroads Station", sys: "Stanton", lat: -0.01, lon: 118.85, dist: 43.45},
            {name: "New Babbage (Microtech)", sys: "Stanton", lat: 0.00, lon: 55, dist: 42},
            {name: "Nyx Gateway (Stanton)", sys: "Stanton", lat: 16.88, lon: 159.35, dist: 69.55},
            {name: "Orison (Crusader)", sys: "Stanton", lat: 0.00, lon: -80, dist: 36}
        ].sort((a, b) => a.name.localeCompare(b.name));

        let contractType = 'single-multi';
        let tracking = {};
        let currentRoute = null;

        function sphericalToCartesian(lat, lon, dist) {
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            return {
                x: dist * Math.cos(latRad) * Math.cos(lonRad),
                y: dist * Math.cos(latRad) * Math.sin(lonRad),
                z: dist * Math.sin(latRad)
            };
        }

        function getDistance(locA, locB) {
            const a = sphericalToCartesian(locA.lat, locA.lon, locA.dist);
            const b = sphericalToCartesian(locB.lat, locB.lon, locB.dist);
            return Math.sqrt(Math.pow(a.x - b.x, 2) + Math.pow(a.y - b.y, 2) + Math.pow(a.z - b.z, 2));
        }

        function updateLocationOptions() {
            const system = document.getElementById('systemSelect').value;
            const start = document.getElementById('startLocation');
            start.innerHTML = '<option value="">Current Location</option>';
            locations.filter(l => system === 'All' || l.sys === system).forEach(loc => {
                const opt = document.createElement('option');
                opt.value = loc.name;
                opt.textContent = `${loc.name} (${loc.sys})`;
                start.appendChild(opt);
            });
        }

        function setContractType(type) {
            contractType = type;
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            updateUI();
            
            // Clear ALL grid styles first
            const pickups = document.getElementById('pickups');
            const dropoffs = document.getElementById('dropoffs');
            
            pickups.style.cssText = '';
            dropoffs.style.cssText = '';
            
            // Then apply only the needed styles for this mode
            if (type === 'single-multi') {
                dropoffs.style.display = 'grid';
                dropoffs.style.gridTemplateColumns = 'repeat(2, 1fr)';
                dropoffs.style.gap = '8px';
            } else if (type === 'multi-single') {
                pickups.style.display = 'grid';
                pickups.style.gridTemplateColumns = 'repeat(2, 1fr)';
                pickups.style.gap = '8px';
            }
            // multi-multi: no grid applied, stays normal
        }

        function updateUI() {
            const pickupLabel = document.getElementById('pickupLabel');
            const dropoffLabel = document.getElementById('dropoffLabel');
            
            if (contractType === 'single-multi') {
                pickupLabel.textContent = 'Pickup (1)';
                dropoffLabel.textContent = 'Dropoffs (up to 10)';
                dropoffLabel.style.display = 'block';
                document.getElementById('dropoffs').style.display = 'block';
                renderPickups(1);
                renderDropoffs(10);
            } else if (contractType === 'multi-single') {
                pickupLabel.textContent = 'Pickups (up to 10)';
                dropoffLabel.textContent = 'Dropoff (1)';
                dropoffLabel.style.display = 'block';
                document.getElementById('dropoffs').style.display = 'block';
                renderPickups(10);
                renderDropoffs(1);
            } else {
                pickupLabel.textContent = 'Pickups + Destinations (up to 15)';
                dropoffLabel.style.display = 'none';
                document.getElementById('dropoffs').style.display = 'none';
                renderPickupsMultiMulti(15);
            }
        }

        function getLocationsBySystem() {
            const system = document.getElementById('systemSelect').value;
            if (system === 'All') {
                return locations;
            }
            return locations.filter(l => l.sys === system);
        }

        function getLocationHTML() {
            const system = document.getElementById('systemSelect').value;
            const locs = getLocationsBySystem();
            
            if (system === 'All') {
                // Group by system with optgroups
                const systems = [...new Set(locs.map(l => l.sys))].sort();
                let html = '';
                systems.forEach(sys => {
                    const sysLocs = locs.filter(l => l.sys === sys).sort((a, b) => a.name.localeCompare(b.name));
                    html += `<optgroup label="${sys}">`;
                    sysLocs.forEach(loc => {
                        html += `<option value="${loc.name}">${loc.name}</option>`;
                    });
                    html += `</optgroup>`;
                });
                return html;
            } else {
                // Single system, alphabetical
                return locs.sort((a, b) => a.name.localeCompare(b.name))
                    .map(l => `<option value="${l.name}">${l.name}</option>`)
                    .join('');
            }
        }

        function renderPickups(max) {
            const container = document.getElementById('pickups');
            container.innerHTML = '';
            for (let i = 1; i <= max; i++) {
                const row = document.createElement('div');
                row.className = 'contract-row';
                row.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 60px; gap: 6px;">
                        <select class="pickup-select" data-idx="${i}" onchange="updateStatus()">
                            <option value="">[ Skip ]</option>
                            ${getLocationHTML()}
                        </select>
                        <input type="number" class="pickup-cargo" data-idx="${i}" placeholder="SCU" min="0" onchange="updateStatus()">
                    </div>
                `;
                container.appendChild(row);
            }
        }

        function renderPickupsMultiMulti(max) {
            const container = document.getElementById('pickups');
            container.innerHTML = '';
            for (let i = 1; i <= max; i++) {
                const row = document.createElement('div');
                row.className = 'contract-row';
                row.innerHTML = `
                    <div style="display: grid; grid-template-columns: 1fr 1fr 50px; gap: 6px; align-items: center;">
                        <select class="pickup-select" data-idx="${i}" onchange="updateStatus()">
                            <option value="">[ Skip ]</option>
                            ${getLocationHTML()}
                        </select>
                        <select class="pickup-dest" data-idx="${i}" onchange="updateStatus()">
                            <option value="">Dest →</option>
                            ${getLocationHTML()}
                        </select>
                        <input type="number" class="pickup-cargo" data-idx="${i}" placeholder="SCU" min="0" onchange="updateStatus()">
                    </div>
                `;
                container.appendChild(row);
            }
        }

        function renderDropoffs(max) {
            const container = document.getElementById('dropoffs');
            container.innerHTML = '';
            for (let i = 1; i <= max; i++) {
                const row = document.createElement('div');
                row.className = 'contract-row';
                const hasCargoInput = contractType === 'single-multi';
                row.innerHTML = `
                    <div style="display: grid; grid-template-columns: ${hasCargoInput ? '1fr 60px' : '1fr'}; gap: 6px;">
                        <select class="dropoff-select" data-idx="${i}" onchange="updateStatus()">
                            <option value="">[ Skip ]</option>
                            ${getLocationHTML()}
                        </select>
                        ${hasCargoInput ? `<input type="number" class="dropoff-cargo" data-idx="${i}" placeholder="SCU" min="0" onchange="updateStatus()">` : ''}
                    </div>
                `;
                container.appendChild(row);
            }
        }

        function updateStatus() {
            const shipSelect = document.getElementById('shipSelect');
            if (!shipSelect.value) {
                document.getElementById('statusBox').innerHTML = '';
                return;
            }

            const capacity = parseInt(shipSelect.options[shipSelect.selectedIndex].getAttribute('data-capacity'));
            let totalCargo = 0;

            document.querySelectorAll('.pickup-cargo').forEach(input => {
                if (input.value) totalCargo += parseInt(input.value) || 0;
            });
            document.querySelectorAll('.dropoff-cargo').forEach(input => {
                if (input.value) totalCargo += parseInt(input.value) || 0;
            });

            let statusClass = 'status-box';
            let statusText = `✓ OK | ${totalCargo}/${capacity} SCU`;
            if (totalCargo > capacity) {
                statusClass += ' error';
                statusText = `✗ OVERLOAD | ${totalCargo}/${capacity} SCU (+${totalCargo - capacity})`;
            } else if (totalCargo > capacity * 0.8) {
                statusClass += ' warn';
                statusText = `⚠ HIGH | ${totalCargo}/${capacity} SCU`;
            }

            document.getElementById('statusBox').innerHTML = `<div class="${statusClass}">${statusText}</div>`;
            saveState();
        }

        function calculateRoute() {
            const start = document.getElementById('startLocation').value;
            
            if (contractType === 'multi-multi') {
                calculateMultiMultiRoute(start);
            } else {
                const pickups = Array.from(document.querySelectorAll('.pickup-select')).map((sel, i) => ({
                    name: sel.value,
                    cargo: parseInt(document.querySelector(`.pickup-cargo[data-idx="${i+1}"]`)?.value) || 0
                })).filter(p => p.name);

                const dropoffs = Array.from(document.querySelectorAll('.dropoff-select')).map((sel, i) => ({
                    name: sel.value,
                    cargo: parseInt(document.querySelector(`.dropoff-cargo[data-idx="${i+1}"]`)?.value) || 0
                })).filter(d => d.name);

                if (pickups.length === 0 || dropoffs.length === 0) {
                    document.getElementById('route').textContent = 'Add pickups and dropoffs to calculate route.';
                    return;
                }

                tracking = {};
                if (contractType === 'single-multi') {
                    renderRoute(routeSingleToMulti(start, pickups, dropoffs));
                } else {
                    renderRoute(routeMultiToSingle(start, pickups, dropoffs));
                }
            }
            saveState();
        }

        function calculateMultiMultiRoute(start) {
            const pickups = Array.from(document.querySelectorAll('.pickup-select')).map((sel, i) => ({
                name: sel.value,
                destination: document.querySelector(`.pickup-dest[data-idx="${i+1}"]`)?.value || '',
                cargo: parseInt(document.querySelector(`.pickup-cargo[data-idx="${i+1}"]`)?.value) || 0
            })).filter(p => p.name && p.destination);

            if (pickups.length === 0) {
                document.getElementById('route').textContent = 'Add pickups with destinations to calculate route.';
                return;
            }

            let steps = [];
            let totalDist = 0;
            let totalCargo = pickups.reduce((sum, p) => sum + p.cargo, 0);
            
            const startLoc = locations.find(l => l.name === start) || locations.find(l => l.name === pickups[0].name);
            let current = startLoc;

            // PHASE 1: Deliver to all destinations (nearest-neighbor)
            const destinations = [...new Set(pickups.map(p => p.destination))].map(destName => ({
                name: destName,
                cargo: pickups.filter(p => p.destination === destName).reduce((sum, p) => sum + p.cargo, 0)
            }));

            steps.push({text: 'DELIVERIES:', clickable: false, phase: 'delivery'});
            let remDests = [...destinations];
            let idx = 1;

            while (remDests.length > 0) {
                let nearestIdx = 0;
                let minDist = Infinity;

                remDests.forEach((d, didx) => {
                    const dLoc = locations.find(l => l.name === d.name);
                    const dist = getDistance(current, dLoc);
                    if (dist < minDist) {
                        minDist = dist;
                        nearestIdx = didx;
                    }
                });

                const next = remDests.splice(nearestIdx, 1)[0];
                const nextLoc = locations.find(l => l.name === next.name);
                steps.push({id: `deliver-${idx-1}`, text: `  ${idx}. ${next.name} (${next.cargo}SCU) — ${minDist.toFixed(1)}GM`, clickable: true, phase: 'delivery'});
                totalDist += minDist;
                current = nextLoc;
                idx++;
            }

            steps.push({text: 'COLLECTIONS:', clickable: false, phase: 'collection'});

            // PHASE 2: Collect all pickups (nearest-neighbor, ignore destinations)
            let remaining = [...pickups];
            idx = 1;

            while (remaining.length > 0) {
                let nearestIdx = 0;
                let minDist = Infinity;

                remaining.forEach((p, pidx) => {
                    const pLoc = locations.find(l => l.name === p.name);
                    const d = getDistance(current, pLoc);
                    if (d < minDist) {
                        minDist = d;
                        nearestIdx = pidx;
                    }
                });

                const next = remaining.splice(nearestIdx, 1)[0];
                const nextLoc = locations.find(l => l.name === next.name);
                steps.push({id: `pickup-${idx-1}`, text: `  ${idx}. ${next.name} (${next.cargo}SCU → ${next.destination}) — ${minDist.toFixed(1)}GM`, clickable: true, phase: 'collection'});
                totalDist += minDist;
                current = nextLoc;
                idx++;
            }

            tracking = {};
            renderRoute({
                type: 'Multi Pickup → Multi Dropoff (Optimized)',
                steps,
                totalDist: totalDist.toFixed(1),
                totalCargo
            });
        }

        function routeSingleToMulti(start, pickups, dropoffs) {
            const pickup = pickups[0];
            const startLoc = locations.find(l => l.name === start) || locations.find(l => l.name === pickup.name);
            let current = startLoc;
            let totalDist = 0;
            let steps = [];
            
            const pickupLoc = locations.find(l => l.name === pickup.name);
            if (start && start !== pickup.name) {
                const d = getDistance(startLoc, pickupLoc);
                totalDist += d;
            }

            steps.push({id: 'pickup-0', text: `PICKUP: ${pickup.name} (${pickup.cargo}SCU)`, clickable: true});
            current = pickupLoc;
            
            dropoffs.forEach((drop, idx) => {
                const dropLoc = locations.find(l => l.name === drop.name);
                const d = getDistance(current, dropLoc);
                totalDist += d;
                steps.push({id: `dropoff-${idx}`, text: `  ${idx + 1}. ${drop.name} — ${d.toFixed(1)}GM ${drop.cargo ? `(${drop.cargo}SCU)` : ''}`, clickable: true});
                current = dropLoc;
            });

            return {
                type: 'Single Pickup → Multi Dropoff',
                steps,
                totalDist: totalDist.toFixed(1),
                totalCargo: pickup.cargo
            };
        }

        function routeMultiToSingle(start, pickups, dropoffs) {
            const dropoff = dropoffs[0];
            const startLoc = locations.find(l => l.name === start) || locations.find(l => l.name === pickups[0].name);
            let remaining = [...pickups];
            let current = startLoc;
            let totalDist = 0;
            let steps = [];
            let totalCargo = pickups.reduce((sum, p) => sum + p.cargo, 0);

            let idx = 1;
            while (remaining.length > 0) {
                let nearestIdx = 0;
                let minDist = Infinity;
                
                remaining.forEach((p, pidx) => {
                    const pLoc = locations.find(l => l.name === p.name);
                    const d = getDistance(current, pLoc);
                    if (d < minDist) {
                        minDist = d;
                        nearestIdx = pidx;
                    }
                });

                const next = remaining.splice(nearestIdx, 1)[0];
                const nextLoc = locations.find(l => l.name === next.name);
                steps.push({id: `pickup-${idx-1}`, text: `  ${idx}. ${next.name} (${next.cargo}SCU) — ${minDist.toFixed(1)}GM`, clickable: true});
                totalDist += minDist;
                current = nextLoc;
                idx++;
            }

            const dropoffLoc = locations.find(l => l.name === dropoff.name);
            const finalDist = getDistance(current, dropoffLoc);
            totalDist += finalDist;

            steps.push({id: 'dropoff-0', text: `DROPOFF: ${dropoff.name} — ${finalDist.toFixed(1)}GM`, clickable: true});

            return {
                type: 'Multi Pickup → Single Dropoff',
                steps,
                totalDist: totalDist.toFixed(1),
                totalCargo
            };
        }

        function renderRoute(route) {
            const container = document.getElementById('route');
            let html = `<div class="route-header">${route.type}</div>`;
            html += `<div class="route-header">${'═'.repeat(50)}</div>`;

            let currentPhase = '';
            route.steps.forEach(step => {
                if (step.phase && step.phase !== currentPhase) {
                    currentPhase = step.phase;
                    html += `<div class="route-phase active"><div style="color: var(--accent); font-weight: 700; margin-top: 4px;">${step.text}</div></div>`;
                } else if (step.clickable) {
                    html += `<div class="route-line clickable" data-id="${step.id}" onclick="toggleStep('${step.id}')">${step.text}</div>`;
                } else if (!step.phase) {
                    html += `<div class="route-line">${step.text}</div>`;
                }
            });

            html += `<div class="route-summary">${'═'.repeat(50)}</div>`;
            html += `<div class="route-summary">TOTAL: ${route.totalDist}GM | ${route.totalCargo}SCU</div>`;

            container.innerHTML = html;
            updateTrackingDisplay();
            updateProgressInfo(route.steps);
        }

        function updateProgressInfo(steps) {
            const clickableSteps = steps.filter(s => s.clickable).length;
            const completedSteps = Object.keys(tracking).filter(k => tracking[k]).length;
            document.getElementById('progressInfo').textContent = `Progress: ${completedSteps}/${clickableSteps}`;
        }

        function toggleStep(id) {
            tracking[id] = !tracking[id];
            saveTracking();
            updateTrackingDisplay();
            updateProgressInfo(currentRoute?.steps || []);
        }

        function updateTrackingDisplay() {
            document.querySelectorAll('.route-line.clickable').forEach(el => {
                const id = el.getAttribute('data-id');
                if (tracking[id]) {
                    el.classList.add('completed');
                } else {
                    el.classList.remove('completed');
                }
            });
        }

        function resetTracking() {
            tracking = {};
            saveTracking();
            updateTrackingDisplay();
            updateProgressInfo(currentRoute?.steps || []);
        }

        function clearAll() {
            if (confirm('Clear all data?')) {
                localStorage.removeItem('scContractState');
                localStorage.removeItem('scContractTracking');
                location.reload();
            }
        }

        const themeColors = {
            orange: { accent: '#f97316', hover: '#ff8c42' },
            green: { accent: '#22c55e', hover: '#4ade80' },
            purple: { accent: '#a855f7', hover: '#c084fc' },
            blue: { accent: '#3b82f6', hover: '#60a5fa' }
        };

        function setThemeColor(color) {
            if (!themeColors[color]) return;
            const theme = themeColors[color];
            document.documentElement.style.setProperty('--accent', theme.accent);
            document.documentElement.style.setProperty('--accent-hover', theme.hover);
            localStorage.setItem('scThemeColor', color);
            updateThemeActive();
        }

        function updateThemeActive() {
            document.querySelectorAll('.theme-ball').forEach(ball => {
                ball.classList.remove('active');
            });
            const current = localStorage.getItem('scThemeColor') || 'orange';
            document.querySelector(`[data-theme="${current}"]`)?.classList.add('active');
        }

        function loadTheme() {
            const color = localStorage.getItem('scThemeColor') || 'orange';
            setThemeColor(color);
        }

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function saveState() {
            const state = {
                contractType,
                system: document.getElementById('systemSelect').value,
                ship: document.getElementById('shipSelect').value,
                start: document.getElementById('startLocation').value,
                pickups: Array.from(document.querySelectorAll('.pickup-select')).map((sel, i) => ({
                    location: sel.value,
                    cargo: document.querySelector(`.pickup-cargo[data-idx="${i+1}"]`)?.value || '',
                    dest: document.querySelector(`.pickup-dest[data-idx="${i+1}"]`)?.value || ''
                })),
                dropoffs: Array.from(document.querySelectorAll('.dropoff-select')).map((sel, i) => ({
                    location: sel.value,
                    cargo: document.querySelector(`.dropoff-cargo[data-idx="${i+1}"]`)?.value || ''
                }))
            };
            localStorage.setItem('scContractState', JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem('scContractState');
            if (!saved) return;
            const state = JSON.parse(saved);
            
            if (state.contractType) {
                contractType = state.contractType;
                document.querySelectorAll('.toggle-btn').forEach((btn, idx) => {
                    btn.classList.remove('active');
                    if ((idx === 0 && contractType === 'single-multi') ||
                        (idx === 1 && contractType === 'multi-single') ||
                        (idx === 2 && contractType === 'multi-multi')) {
                        btn.classList.add('active');
                    }
                });
            }

            if (state.system) document.getElementById('systemSelect').value = state.system;
            if (state.ship) document.getElementById('shipSelect').value = state.ship;

            updateLocationOptions();
            if (state.start) document.getElementById('startLocation').value = state.start;

            updateUI();
            
            // Apply two-col styles after updateUI
            const pickups = document.getElementById('pickups');
            const dropoffs = document.getElementById('dropoffs');
            
            pickups.style.display = '';
            pickups.style.gridTemplateColumns = '';
            pickups.style.gap = '';
            dropoffs.style.display = '';
            dropoffs.style.gridTemplateColumns = '';
            dropoffs.style.gap = '';
            
            if (contractType === 'single-multi') {
                dropoffs.style.display = 'grid';
                dropoffs.style.gridTemplateColumns = 'repeat(2, 1fr)';
                dropoffs.style.gap = '8px';
            } else if (contractType === 'multi-single') {
                pickups.style.display = 'grid';
                pickups.style.gridTemplateColumns = 'repeat(2, 1fr)';
                pickups.style.gap = '8px';
            }

            setTimeout(() => {
                state.pickups?.forEach((p, i) => {
                    const sel = document.querySelector(`.pickup-select[data-idx="${i+1}"]`);
                    const cargo = document.querySelector(`.pickup-cargo[data-idx="${i+1}"]`);
                    const dest = document.querySelector(`.pickup-dest[data-idx="${i+1}"]`);
                    if (sel) sel.value = p.location;
                    if (cargo) cargo.value = p.cargo;
                    if (dest) dest.value = p.dest;
                });

                state.dropoffs?.forEach((d, i) => {
                    const sel = document.querySelector(`.dropoff-select[data-idx="${i+1}"]`);
                    const cargo = document.querySelector(`.dropoff-cargo[data-idx="${i+1}"]`);
                    if (sel) sel.value = d.location;
                    if (cargo) cargo.value = d.cargo;
                });

                loadTracking();
                updateStatus();
            }, 100);
        }

        function saveTracking() {
            localStorage.setItem('scContractTracking', JSON.stringify(tracking));
        }

        function loadTracking() {
            const saved = localStorage.getItem('scContractTracking');
            if (saved) tracking = JSON.parse(saved);
            updateTrackingDisplay();
        }

        window.onload = () => {
            loadTheme();
            updateLocationOptions();
            loadState();
        };

        document.addEventListener('change', updateStatus);
    </script>
</body>
</html>
